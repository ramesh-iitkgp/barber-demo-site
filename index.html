<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BLADE & CO. | Premium Barbershop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="./assets/index-CeKK1U3C.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-oeRsTt37.css">
  </head>
  <body>
    <div id="root"></div>
  
    <!-- Dynamic Business & WhatsApp Injection (post-build) -->
    <script>
        // Read query parameters
        const params = new URLSearchParams(window.location.search);
        const nameSlug = params.get('name') || '';
        const cityLocation = params.get('location') || '';
        const phone = (params.get('phone') || '').replace(/\D/g, '');

        // Convert slug ("elegant-beauty-salon") → "Elegant Beauty Salon"
        function slugToTitle(slug) {
            if (!slug) return '';
            return slug
                .split('-')
                .map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase())
                .join(' ');
        }

        const businessName = slugToTitle(nameSlug);

        function applyUpdates() {
            // 1) Page title
            if (businessName) {
                try {
                    document.title = cityLocation
                        ? `${businessName} | ${cityLocation}`
                        : businessName;
                } catch (e) {}
            }

            // 2) Main headings / brand text
            if (businessName) {
                const headingSelectors = [
                    'h1',
                    'h2',
                    '[class*="Hero"]',
                    '[class*="hero"]',
                    '[class*="Title"]',
                    '[class*="title"]',
                    '[id*="name"]',
                    '[id*="title"]'
                ];

                const seen = new Set();
                headingSelectors.forEach(sel => {
                    document.querySelectorAll(sel).forEach(el => {
                        if (seen.has(el)) return;
                        const text = (el.textContent || '').trim();
                        if (!text) return;
                        // Only override short titles / demo text
                        if (text.length <= 60 || /demo|salon|barber|cafe|clinic|restaurant/i.test(text)) {
                            el.textContent = businessName;
                            seen.add(el);
                        }
                    });
                });
            }

            // 3) Location labels
            if (cityLocation) {
                const locSelectors = [
                    '[id*="location"]',
                    '[class*="location"]',
                    '[id*="city"]',
                    '[class*="city"]'
                ];
                locSelectors.forEach(sel => {
                    document.querySelectorAll(sel).forEach(el => {
                        if (!el.textContent || el.textContent.length <= 80) {
                            el.textContent = cityLocation;
                        }
                    });
                });
            }

            // 4) Phone & WhatsApp links
            if (phone) {
                const parts = [businessName, cityLocation].filter(Boolean);
                const msg = encodeURIComponent(parts.join(' - '));
                const url = `https://wa.me/${phone}?text=${msg}`;

                // Update obvious WhatsApp buttons/links
                document
                    .querySelectorAll(
                        'a[href*="wa.me"], a[href*="whatsapp"], .whatsapp-btn, .btn-whatsapp'
                    )
                    .forEach(a => {
                        a.setAttribute('href', url);
                        a.setAttribute('target', '_blank');
                        a.setAttribute('rel', 'noopener');
                    });

                // Update any phone display elements
                document
                    .querySelectorAll('[id*="phone"], [class*="phone"], [data-phone]')
                    .forEach(el => {
                        el.textContent = phone;
                    });
            }
        }

        // Initial update and a few retries to catch late React renders
        applyUpdates();
        setTimeout(applyUpdates, 300);
        setTimeout(applyUpdates, 800);
        setTimeout(applyUpdates, 1500);
        setTimeout(applyUpdates, 3000);

        // Observe React DOM changes
        new MutationObserver(() => applyUpdates()).observe(document.body, {
            childList: true,
            subtree: true,
            characterData: true,
        });
    </script>
</body>
</html>
