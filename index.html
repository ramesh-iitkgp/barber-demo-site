<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BLADE & CO. | Premium Barbershop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/barber-demo-site/assets/index-DNTiPzUt.js"></script>
    <link rel="stylesheet" crossorigin href="/barber-demo-site/assets/index-CrztOKZR.css">
  </head>
  <body>
    <div id="root"></div>
  
    <!-- Dynamic Business & WhatsApp Injection -->
    <script>
        window.__dynamicParams = {};
        const params = new URLSearchParams(window.location.search);
        window.__dynamicParams.nameSlug = params.get('name') || '';
        window.__dynamicParams.cityLocation = params.get('location') || '';
        window.__dynamicParams.phone = (params.get('phone') || '').replace(/\D/g, '');

        function slugToTitle(slug) {
            if (!slug) return '';
            return slug.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }

        window.__dynamicParams.businessName = slugToTitle(window.__dynamicParams.nameSlug);
        console.log('✅ INJECTION ACTIVE:', window.__dynamicParams);

        function updatePage() {
            const { businessName, cityLocation, phone } = window.__dynamicParams;
            
            // Update title
            if (businessName) {
                document.title = cityLocation ? `${businessName} | ${cityLocation}` : businessName;
            }

            // Update location - aggressively target contactLocation id
            if (cityLocation) {
                const locEl = document.getElementById('contactLocation');
                if (locEl) locEl.textContent = cityLocation;
                
                document.querySelectorAll('[id*="location"], [class*="location"], [id*="city"], [class*="city"]').forEach(el => {
                    if (!el.textContent || el.textContent.length < 100) {
                        el.textContent = cityLocation;
                    }
                });
            }

            // Update phone - aggressively target contactPhone id
            if (phone) {
                const phoneEl = document.getElementById('contactPhone');
                if (phoneEl) phoneEl.textContent = phone;
                
                document.querySelectorAll('[id*="phone"], [class*="phone"]').forEach(el => {
                    if (!el.textContent || el.textContent.length < 30) {
                        el.textContent = phone;
                    }
                });

                // Update WhatsApp links
                const msg = encodeURIComponent([businessName, cityLocation].filter(Boolean).join(' - '));
                document.querySelectorAll('a[href*="wa.me"], .whatsapp-btn').forEach(a => {
                    a.href = `https://wa.me/${phone}?text=${msg}`;
                });
            }

            // Update business name  
            if (businessName) {
                document.querySelectorAll('h1, h2, [id*="name"], [id*="title"]').forEach(el => {
                    const text = (el.textContent || '').trim();
                    if (text && text.length < 100 && /barber|shop|salon|clinic/i.test(text || businessName)) {
                        el.textContent = businessName;
                    }
                });
            }
        }

        // Apply on load and keep retrying
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                updatePage();
                setInterval(updatePage, 1000);
            });
        } else {
            updatePage();
            setInterval(updatePage, 1000);
        }

        // Observe for React changes
        new MutationObserver(updatePage).observe(document.body, { childList: true, subtree: true });
    </script>
</body>
</html>
