<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BLADE & CO. | Premium Barbershop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="./assets/index-hLPdoZlv.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-oeRsTt37.css">
  </head>
  <body>
    <div id="root"></div>
  
    <!-- Dynamic WhatsApp Injection (post-build) -->
    <script>
        const params = new URLSearchParams(window.location.search);
        const nameSlug = params.get('name') || '';
        const location = params.get('location') || '';
        const phone = (params.get('phone') || '').replace(/\D/g, '');

        function slugToTitle(slug) {
            if (!slug) return 'Business';
            return slug.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
        }

        const businessName = slugToTitle(nameSlug);

        // Inject CSS for brand name override (works for images/SVGs too)
        const style = document.createElement('style');
        style.textContent = `
            /* Hide original brand text/images */
            body *:not(script):not(style) {
                --original-text: '';
            }
            /* Override specific brand names with new ones */
            [class*="logo"], [class*="brand"], [class*="header"], [id*="logo"], [id*="brand"] {
                font-size: inherit !important;
            }
        `;
        document.head.appendChild(style);

        function applyUpdates() {
            if (phone) {
                const parts = [businessName, location].filter(Boolean);
                const msg = encodeURIComponent(parts.join(' - '));
                const url = `https://wa.me/${phone}?text=${msg}`;
                document.querySelectorAll('a[href*="wa.me"], a[href*="whatsapp"], #whatsappNav, .whatsapp-btn, .btn-whatsapp').forEach(a => {
                    a.setAttribute('href', url);
                    a.setAttribute('target', '_blank');
                    a.setAttribute('rel', 'noopener');
                });
            }

            if (businessName) {
                try { document.title = location ? `${businessName} | ${location}` : businessName; } catch (e) {}
                document.querySelectorAll('[id*="name" i], [id*="title" i]').forEach(el => {
                    if (el.textContent && el.textContent.length < 80) el.textContent = businessName;
                });
                
                // Replace text nodes directly
                const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
                let node;
                const nodesToReplace = [];
                while (node = walker.nextNode()) {
                    const text = node.textContent.trim().toUpperCase();
                    if (text === "GENTLEMAN'S & CO." || text === 'BLADE & CO.' || text === 'OPEN HOUSE CAFE') {
                        nodesToReplace.push(node);
                    }
                }
                nodesToReplace.forEach(node => {
                    node.textContent = businessName.toUpperCase();
                });
            }

            if (location) {
                document.querySelectorAll('[id*="location" i], [id*="city" i]').forEach(el => {
                    if (el.textContent && el.textContent.length < 80) el.textContent = location;
                });
                const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
                let node;
                while (node = walker.nextNode()) {
                    const text = node.textContent.trim();
                    if (text === 'Siliguri' || text === 'Cafe in Siliguri') node.textContent = location;
                }
            }
        }

        // Run multiple times and watch for changes
        applyUpdates();
        setTimeout(applyUpdates, 500);
        setTimeout(applyUpdates, 1200);
        setTimeout(applyUpdates, 2500);
        
        // Watch for DOM changes (React re-renders)
        new MutationObserver(() => applyUpdates()).observe(document.body, { childList: true, subtree: true, characterData: false });
    </script>
</body>
</html>
