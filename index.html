<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BLADE & CO. | Premium Barbershop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/barber-demo-site/assets/index-B_fmpqCj.js"></script>
    <link rel="stylesheet" crossorigin href="/barber-demo-site/assets/index-BSbLxi7U.css">
  </head>
  <body>
    <div id="root"></div>
  
    <!-- Dynamic Business & WhatsApp Injection -->
    <script>
        window.__dynamicParams = {};
        const params = new URLSearchParams(window.location.search);
        window.__dynamicParams.nameSlug = params.get('name') || '';
        window.__dynamicParams.cityLocation = params.get('location') || '';
        window.__dynamicParams.phone = (params.get('phone') || '').replace(/\D/g, '');
        
        function slugToTitle(slug) {
            if (!slug) return '';
            return slug.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }
        
        window.__dynamicParams.businessName = slugToTitle(window.__dynamicParams.nameSlug);
        console.log('✅ INJECTION ACTIVE:', window.__dynamicParams);
        
        function updatePage() {
            // Direct ID targeting
            const locEl = document.getElementById('contactLocation');
            if (locEl && window.__dynamicParams.cityLocation) {
                locEl.textContent = window.__dynamicParams.cityLocation;
            }
            const phoneEl = document.getElementById('contactPhone');
            if (phoneEl && window.__dynamicParams.phone) {
                phoneEl.textContent = window.__dynamicParams.phone;
            }
            
            // Generic fallback selectors
            document.querySelectorAll('[id*="location"], [id*="city"], [class*="location"]').forEach(el => {
                if (window.__dynamicParams.cityLocation && el.textContent.includes('Main') || el.textContent.includes('Street')) {
                    el.textContent = window.__dynamicParams.cityLocation;
                }
            });
            
            document.querySelectorAll('[id*="phone"], [id*="contact"], [class*="phone"]').forEach(el => {
                if (window.__dynamicParams.phone && /\d{10}/.test(el.textContent)) {
                    el.textContent = window.__dynamicParams.phone;
                }
            });
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                updatePage();
                setInterval(updatePage, 1000);
            });
        } else {
            updatePage();
            setInterval(updatePage, 1000);
        }
        
        new MutationObserver(updatePage).observe(document.body, {
            childList: true, subtree: true, characterData: true, attributes: true
        });
    </script>

</body>
</html>
