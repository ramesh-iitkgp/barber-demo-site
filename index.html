<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BLADE & CO. | Premium Barbershop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="./assets/index-hLPdoZlv.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-oeRsTt37.css">
  </head>
  <body>
    <div id="root"></div>
  
    <!-- Dynamic WhatsApp Injection (post-build) -->
    <script>
        const params = new URLSearchParams(window.location.search);
        const nameSlug = params.get('name') || '';
        const location = params.get('location') || '';
        const phone = (params.get('phone') || '').replace(/\D/g, '');

        function slugToTitle(slug) {
            if (!slug) return 'Business';
            return slug.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
        }

        const businessName = slugToTitle(nameSlug);

        function applyUpdates() {
            if (phone) {
                const parts = [];
                if (businessName) parts.push(businessName);
                if (location) parts.push(location);
                const msg = encodeURIComponent(parts.join(' - '));
                const url = `https://wa.me/${phone}?text=${msg}`;
                document.querySelectorAll('a[href*="wa.me"], a[href*="whatsapp"], #whatsappNav, .whatsapp-btn, .btn-whatsapp').forEach(a => {
                    a.setAttribute('href', url);
                    a.setAttribute('target', '_blank');
                    a.setAttribute('rel', 'noopener');
                });
            }

            if (businessName) {
                try { document.title = location ? `${businessName} | ${location}` : businessName; } catch (e) {}
                document.querySelectorAll('[id*="name" i], [id*="title" i]').forEach(el => {
                    if (el.textContent && el.textContent.length < 80) el.textContent = businessName;
                });
                document.querySelectorAll('*').forEach(el => {
                    if (!el.childNodes || el.childNodes.length !== 1) return;
                    const text = (el.textContent || '').trim();
                    if (!text) return;
                    const norm = text.replace(/\s+/g, ' ').toUpperCase();
                    if (norm === 'OPEN HOUSE CAFE' || norm === "GENTLEMAN'S & CO." || norm === 'BLADE & CO.') {
                        el.textContent = businessName.toUpperCase();
                    }
                });
            }

            if (location) {
                document.querySelectorAll('[id*="location" i], [id*="city" i]').forEach(el => {
                    if (el.textContent && el.textContent.length < 80) el.textContent = location;
                });
                document.querySelectorAll('*').forEach(el => {
                    const text = (el.textContent || '').trim();
                    if (text === 'Siliguri' || text === 'Cafe in Siliguri') el.textContent = location;
                });
            }
        }

        applyUpdates();
        setTimeout(applyUpdates, 800);
        setTimeout(applyUpdates, 2000);
        
        // MutationObserver to catch React re-renders
        new MutationObserver(() => applyUpdates()).observe(document.body, { childList: true, subtree: true });
    </script>
</body>
</html>
